{% set name = "hepstats" %}
{% set version = "0.10.0" %}
{% set python_min = "3.10" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/hepstats-{{ version }}.tar.gz
  sha256: e4ff2a592f24f937aea30f5e049388a536ca2472c853b6c0dade5cda77be7189

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - hatchling >1.10.0
    - hatch-vcs
  run:
    - asdf
    - numpy
    - pandas
    - python >={{ python_min }}
    - scipy
    - tqdm
    - uhi
  run_constrained:
    - zfit >=0.20.0

test:
  imports:
    - hepstats
    - hepstats.hypotests
  commands:
    - pip check
  requires:
    - pip
    - zfit
    - python {{ python_min }}

about:
  home: https://scikit-hep.org/hepstats/
  summary: statistics tools and utilities
  license: BSD-3-Clause
  license_file:
    - LICENSES/LICENSE
    - LICENSES/LICENSE_ASTROML.rst
  dev_url: https://github.com/scikit-hep/hepstats
  doc_url: https://scikit-hep.org/hepstats/

extra:
  recipe-maintainers:
    - jonas-eschle
    - chrisburr
