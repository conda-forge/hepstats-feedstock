schema_version: 1

context:
  name: hepstats
  version: "0.10.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/hepstats-${{ version }}.tar.gz
  sha256: cf929871d45e338492eef585faaaa23eff93b200b4787d6b6181dc81f2607be7

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - hatchling >1.10.0
    - hatch-vcs
  run:
    - asdf
    - numpy
    - pandas
    - python >=${{ python_min }}
    - scipy
    - tqdm
    - uhi
  run_constraints:
    - zfit >=0.20.0

tests:
  - python:
      imports:
        - hepstats
        - hepstats.hypotests
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: statistics tools and utilities
  license: BSD-3-Clause
  license_file:
    - LICENSES/LICENSE
    - LICENSES/LICENSE_ASTROML.rst
  homepage: https://scikit-hep.org/hepstats/
  repository: https://github.com/scikit-hep/hepstats
  documentation: https://scikit-hep.org/hepstats/

extra:
  recipe-maintainers:
    - conda-forge/scikit-hep
